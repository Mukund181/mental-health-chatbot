<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSpace — Your Mental Health Companion</title>
    <meta name="description" content="A gentle, private space to talk through your thoughts with an empathetic AI companion.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

    <!-- ===== Auth Screen ===== -->
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-brand">
                <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="52" height="52">
                    <defs>
                        <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#A8D5BA" />
                            <stop offset="100%" stop-color="#3B7A75" />
                        </linearGradient>
                    </defs>
                    <path d="M50 12 C30 38 12 55 12 72 C12 88 28 92 50 92 C72 92 88 88 88 72 C88 55 70 38 50 12 Z" fill="url(#brandGrad)" />
                    <path d="M50 12 C45 35 35 50 22 62" stroke="#FFF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5" />
                    <path d="M50 12 L50 92" stroke="#FFF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3" />
                </svg>
                <h1>SafeSpace</h1>
                <p class="tagline">A calm corner of the internet, just for you.</p>
            </div>

            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" onclick="switchAuthTab('login')">Sign In</button>
                <button id="tab-register" class="auth-tab" onclick="switchAuthTab('register')">Register</button>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="field" id="field-username" style="display:none;">
                    <label for="auth-username">Username</label>
                    <input type="text" id="auth-username" placeholder="Pick a username" autocomplete="username">
                </div>
                <div class="field">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" required placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="field">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" id="auth-submit">Sign In</button>
            </form>

            <div class="divider"><span>or</span></div>

            <button class="btn-ghost" onclick="enterAsGuest()">Continue as Guest</button>
            <p class="fine-print">Guest chats stay in your browser only.</p>
            <div id="auth-error" class="toast-error hidden"></div>
        </div>
    </div>

    <!-- ===== Chat App ===== -->
    <div id="app" class="app-shell hidden">

        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <svg class="topbar-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28">
                    <path d="M50 12 C30 38 12 55 12 72 C12 88 28 92 50 92 C72 92 88 88 88 72 C88 55 70 38 50 12 Z" fill="#3B7A75" />
                    <path d="M50 12 C45 35 35 50 22 62" stroke="#FFF" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6" />
                </svg>
                <span class="topbar-title">SafeSpace</span>
            </div>
            <div class="topbar-right">
                <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" id="theme-toggle-btn">
                    <!-- moon icon (light mode default) -->
                    <svg id="icon-theme" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <div class="user-pill" id="user-pill">
                    <span class="avatar" id="avatar">G</span>
                    <span class="uname" id="uname">Guest</span>
                </div>
                <button class="icon-btn" onclick="signOut()" title="Sign out">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area">
            <!-- Messages -->
            <div class="messages" id="messages">
                <div class="welcome-card">
                    <div class="welcome-icon">🌿</div>
                    <h2>Welcome to SafeSpace</h2>
                    <p>I'm <strong>Aura</strong>, your empathetic companion. I'm not a therapist, but I'm here to listen without judgment and help you find calm. What's on your mind?</p>
                </div>
            </div>

            <!-- Quick Prompts -->
            <div class="prompts" id="prompts">
                <button class="chip" onclick="sendQuick('I\'m feeling anxious today')">😟 Feeling anxious</button>
                <button class="chip" onclick="sendQuick('I had a tough day and need to vent')">😔 Need to vent</button>
                <button class="chip" onclick="sendQuick('Help me calm down')">🧘 Help me calm down</button>
                <button class="chip" onclick="sendQuick('I can\'t sleep')">🌙 Can't sleep</button>
            </div>

            <!-- Input -->
            <div class="input-bar">
                <textarea id="msg-input" placeholder="Type what's on your mind…" rows="1" oninput="autoGrow(this)" onkeydown="handleKey(event)"></textarea>
                <button class="send-btn" id="send-btn" onclick="send()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
